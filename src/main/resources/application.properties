spring.application.name=workgroup_final_project

spring.profiles.active=local

#data source
spring.datasource.url=jdbc:mysql://localhost:3306/masamune
spring.datasource.username=root
spring.datasource.password=root

## Hibernate Properties
# The SQL dialect makes Hibernate generate vetter SQL for the chosen database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate ddl auto (create, create-drop, validate, update, none)
spring.jpa.hibernate.ddl-auto=update

# Date formatting
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
spring.mvc.format.time=HH:mm:ss

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Forza l'esecuzione di data.sql anche su DB non-embedded (MySQL)
spring.sql.init.mode=always

# Esegue data.sql DOPO che Hibernate ha creato le tabelle (essenziale con JPA)
spring.jpa.defer-datasource-initialization=true

app.jwt.secret=${JWT_SECRET:change-this-secret-key-change-this-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
